name: Terraform Drift Detection

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - env: dev
            account_id: "111111111111"
          - env: stage
            account_id: "222222222222"
          - env: prod
            account_id: "333333333333"
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ matrix.account_id }}:role/github-actions-terraform-readonly
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sSL https://github.com/gruntwork-io/terragrunt/releases/download/v0.67.0/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Run drift detection
        id: drift
        working-directory: terraform/live/aws/${{ matrix.env }}
        run: |
          terragrunt run-all plan -detailed-exitcode -no-color 2>&1 | tee drift.txt
          EXIT=${PIPESTATUS[0]}
          # exit code 2 = drift detected
          echo "drift_detected=$([ $EXIT -eq 2 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Open GitHub Issue on drift
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('terraform/live/aws/${{ matrix.env }}/drift.txt', 'utf8');
            const truncated = output.length > 60000 ? output.slice(0, 60000) + '\n...(truncated)' : output;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Drift] ${{ matrix.env }} — ${new Date().toISOString().slice(0,10)}`,
              labels: ['terraform-drift', '${{ matrix.env }}'],
              body: `Drift detected in \`${{ matrix.env }}\` account during nightly scan.\n\n\`\`\`\n${truncated}\n\`\`\``
            });
